apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "prom2notify.fullname" . }}-test-connection"
  labels:
{{ include "prom2notify.labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": test-success
    "helm.sh/hook-delete-policy": test-success,test-failure
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:  ['{{ include "prom2notify.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
